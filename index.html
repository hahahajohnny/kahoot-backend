<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>背經總複習 - 遊戲測試端</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; }
  </style>
</head>
<body class="bg-[#F4F1EA] text-[#2C3E50] h-screen p-4 flex gap-4 overflow-hidden">

  <div class="flex-1 bg-white rounded-3xl shadow-sm p-8 border border-[#E6E2D8] flex flex-col justify-between overflow-y-auto">
    <div>
      <div class="flex justify-between items-center border-b border-gray-100 pb-4 mb-6">
        <h2 class="text-lg font-bold text-[#34495E] tracking-wider">🖥️ 主持人大螢幕看板</h2>
        <div id="host-status-badge" class="bg-[#76A5AF]/10 text-[#76A5AF] px-3 py-1 rounded-full text-xs font-bold">連線準備中</div>
      </div>
      
      <div id="host-lobby" class="space-y-6">
        <button id="btn-create-room" class="bg-[#4A90E2] text-white px-6 py-4 rounded-2xl font-bold hover:bg-[#357ABD] shadow-md shadow-blue-100 transition-all w-full text-lg cursor-pointer">
          開啟遊戲房間 (PIN: 8888)
        </button>
        <div class="bg-[#F8F7F4] rounded-2xl p-6 border border-[#E6E2D8]">
          <p class="font-bold text-sm text-gray-400 tracking-widest mb-3">WAITING LOBBY / 已加入玩家</p>
          <ul id="host-player-list" class="grid grid-cols-3 gap-3 text-lg font-bold text-[#2C3E50]">
            <li class="text-gray-400 font-normal text-sm col-span-3 py-4 text-center">等待大家進房中...</li>
          </ul>
        </div>
        <button id="btn-start-game" class="bg-[#76A5AF] text-white px-6 py-4 rounded-2xl font-bold w-full text-lg shadow-md shadow-emerald-500/10 hover:bg-[#608C95] transition cursor-pointer hidden">
          所有人到齊，開始挑戰！
        </button>
      </div>

      <div id="host-game" class="hidden space-y-6">
        <div class="flex justify-between items-start gap-4">
          <div class="bg-[#F8F9FA] p-6 rounded-2xl border border-gray-100 flex-1">
            <p id="host-q-number" class="text-xs text-[#76A5AF] font-bold tracking-widest">QUESTION 01</p>
            <h1 id="host-question-text" class="text-2xl font-bold mt-2 text-[#2C3E50] leading-relaxed">題目加載中...</h1>
          </div>
          <div class="w-20 h-20 bg-[#2C3E50] rounded-2xl flex flex-col justify-center items-center text-white shadow-lg shadow-slate-700/20">
            <span class="text-xs text-gray-400 font-bold">SEC</span>
            <span id="host-timer" class="text-3xl font-bold leading-none mt-1">20</span>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4 text-base text-white">
          <div id="box-opt-a" class="bg-[#E06666] p-4 rounded-xl font-bold flex items-center gap-3 shadow-sm transition-all">
            <span class="bg-white/20 w-8 h-8 rounded-lg flex items-center justify-center text-sm">A</span>
            <span id="opt-a"></span>
          </div>
          <div id="box-opt-b" class="bg-[#4A90E2] p-4 rounded-xl font-bold flex items-center gap-3 shadow-sm transition-all">
            <span class="bg-white/20 w-8 h-8 rounded-lg flex items-center justify-center text-sm">B</span>
            <span id="opt-b"></span>
          </div>
          <div id="box-opt-c" class="bg-[#F3B344] p-4 rounded-xl font-bold flex items-center gap-3 shadow-sm transition-all">
            <span class="bg-white/20 w-8 h-8 rounded-lg flex items-center justify-center text-sm">C</span>
            <span id="opt-c"></span>
          </div>
          <div id="box-opt-d" class="bg-[#76A5AF] p-4 rounded-xl font-bold flex items-center gap-3 shadow-sm transition-all">
            <span class="bg-white/20 w-8 h-8 rounded-lg flex items-center justify-center text-sm">D</span>
            <span id="opt-d"></span>
          </div>
        </div>

        <div class="text-center font-bold text-gray-400 py-2">
          已作答人數：<span id="host-answered-count" class="text-[#4A90E2] text-xl">0</span> / <span id="host-total-count">0</span>
        </div>
      </div>

      <div id="host-scoreboard" class="hidden space-y-6">
        <div class="text-center">
          <p class="text-sm font-bold text-gray-400 tracking-wider">LEADERBOARD</p>
          <h2 class="text-2xl font-bold text-[#2C3E50] mt-1">目前積分排行榜</h2>
        </div>
        <div class="bg-[#F8F7F4] rounded-2xl border border-[#E6E2D8] p-2 divide-y divide-gray-200" id="leaderboard-list">
          </div>
        <button id="btn-next-question" class="bg-[#2C3E50] text-white px-6 py-4 rounded-2xl font-bold w-full text-lg hover:bg-slate-700 transition cursor-pointer">
          下一題 ➡️
        </button>
      </div>
    </div>
    <div class="text-xs text-gray-400 text-center mt-6 border-t border-gray-100 pt-4">背經總複習 · City Boy 簡約互動版</div>
  </div>

  <div class="w-[380px] bg-[#2C3E50] text-white rounded-3xl shadow-xl p-8 flex flex-col justify-between border border-slate-700">
    <div>
      <div class="flex justify-between items-center border-b border-slate-700 pb-4 mb-6">
        <h2 class="text-md font-bold text-slate-400 tracking-widest">📱 玩家行動端</h2>
        <span id="player-signal" class="w-2 h-2 bg-red-400 rounded-full animate-ping"></span>
      </div>
      
      <div id="player-login" class="space-y-5 mt-4">
        <div>
          <label class="block text-xs font-bold text-slate-400 mb-2 tracking-wider">GAME PIN</label>
          <input id="input-pin" type="text" value="8888" class="w-full bg-[#34495E] border border-slate-600 rounded-2xl px-4 py-4 font-bold text-2xl tracking-widest text-center text-white focus:outline-none focus:border-[#4A90E2] transition-all">
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-400 mb-2 tracking-wider">NICKNAME</label>
          <input id="input-name" type="text" placeholder="輸入你的暱稱" class="w-full bg-[#34495E] border border-slate-600 rounded-2xl px-4 py-4 font-bold text-white focus:outline-none focus:border-[#4A90E2] transition-all text-center">
        </div>
        <button id="btn-join-room" class="w-full bg-[#F3B344] text-[#2C3E50] py-4 rounded-2xl font-bold text-lg hover:bg-[#dfa237] transition shadow-lg shadow-amber-500/10 cursor-pointer">
          進入大廳
        </button>
      </div>

      <div id="player-wait" class="hidden text-center py-16 space-y-4">
        <div class="inline-flex bg-slate-700 w-16 h-16 rounded-full justify-center items-center text-2xl animate-bounce">☕</div>
        <p class="text-xl font-bold">成功進房！</p>
        <p class="text-sm text-slate-400 max-w-[200px] mx-auto leading-relaxed">請注視前方大型公用螢幕，等待主持人揭開序幕...</p>
      </div>

      <div id="player-game" class="hidden space-y-3 py-2">
        <div class="flex justify-between items-center mb-4 bg-slate-700/50 px-3 py-2 rounded-xl">
          <span class="text-xs text-slate-400 font-bold">倒數計時：</span>
          <span id="player-timer" class="text-sm font-bold text-yellow-400">20s</span>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <button onclick="submitAnswer('A')" class="btn-opt bg-[#E06666] py-10 rounded-2xl font-bold text-xl active:scale-95 transition-all shadow-md cursor-pointer">A</button>
          <button onclick="submitAnswer('B')" class="btn-opt bg-[#4A90E2] py-10 rounded-2xl font-bold text-xl active:scale-95 transition-all shadow-md cursor-pointer">B</button>
          <button onclick="submitAnswer('C')" class="btn-opt bg-[#F3B344] py-10 rounded-2xl font-bold text-xl active:scale-95 transition-all shadow-md cursor-pointer">C</button>
          <button onclick="submitAnswer('D')" class="btn-opt bg-[#76A5AF] py-10 rounded-2xl font-bold text-xl active:scale-95 transition-all shadow-md cursor-pointer">D</button>
        </div>
        <p id="player-status" class="text-center text-sm text-amber-400 font-bold mt-4 animate-pulse"></p>
      </div>

      <div id="player-result" class="hidden text-center py-12 space-y-4 rounded-2xl">
        <h2 id="player-result-title" class="text-3xl font-bold">🎉 答對了！</h2>
        <p id="player-result-score" class="text-lg text-slate-300 font-medium">獲得積分：+0 分</p>
        <p class="text-xs text-slate-500">等待主持人切換下一題...</p>
      </div>
    </div>
    <div id="player-footer-name" class="text-xs text-slate-500 text-center border-t border-slate-700/50 pt-4">未登入</div>
  </div>

  <script>
    // 💡 串接你的雲端後端網址
    const CLOUD_URL = 'https://bei-jing-zong-fu-xi.onrender.com';
    const socket = io(CLOUD_URL);

    const ROOM_PIN = '8888';
    
    // 📖 測試題庫（內建正確答案，用於計分）
    const questions = [
      { q: "「神愛世人，甚至將祂的獨生子賜給他們...」後面接哪一句？", a: "叫一切信祂的", b: "不至滅亡", c: "反得永生", d: "以上皆是", correct: "D" },
      { q: "新約聖經的第一卷書是什麼？", a: "馬可福音", b: "馬太福音", c: "路加福音", d: "約翰福音", correct: "B" },
      { q: "「耶和華是我的牧者，我必不至缺乏」出自詩篇第幾篇？", a: "第1篇", b: "第23篇", c: "第50篇", d: "第100篇", correct: "B" }
    ];
    
    let currentQIndex = 0;
    let countdownInterval = null;
    let timeLeft = 20;
    let playersData = {}; // 紀錄所有玩家的分數與狀態
    let currentRoundAnswers = {}; // 紀錄當前回合所有人的答案與作答時間戳

    // 監聽連線狀態
    socket.on('connect', () => {
      document.getElementById('host-status-badge').innerText = "雲端連線成功";
      document.getElementById('host-status-badge').className = "bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold";
      document.getElementById('player-signal').className = "w-2 h-2 bg-green-400 rounded-full";
    });

    // --- 主持人端邏輯 ---
    document.getElementById('btn-create-room').addEventListener('click', () => {
      socket.emit('createRoom', ROOM_PIN);
      document.getElementById('btn-create-room').disabled = true;
      document.getElementById('btn-create-room').innerText = `房間 ${ROOM_PIN} 已開立`;
      document.getElementById('btn-create-room').className = "bg-green-600 text-white px-6 py-4 rounded-2xl font-bold w-full cursor-not-allowed text-lg";
    });

    socket.on('playerJoined', (players) => {
      // 初始化在地玩家分數結構
      players.forEach(p => {
        if (!playersData[p.id]) {
          playersData[p.id] = { nickname: p.nickname, score: 0 };
        }
      });
      
      const list = document.getElementById('host-player-list');
      list.innerHTML = players.map(p => `<li class="bg-[#F8F9FA] p-3 rounded-xl border border-gray-100 text-center shadow-sm">👤 ${p.nickname}</li>`).join('');
      document.getElementById('host-total-count').innerText = players.length;
      
      if(players.length > 0) {
        document.getElementById('btn-start-game').classList.remove('hidden');
      }
    });

    document.getElementById('btn-start-game').addEventListener('click', () => {
      document.getElementById('host-lobby').classList.add('hidden');
      document.getElementById('host-game').classList.remove('hidden');
      sendQuestion();
    });

    function sendQuestion() {
      // 重置當前題目的作答紀錄
      currentRoundAnswers = {};
      document.getElementById('host-answered-count').innerText = "0";
      
      // 顯示題目內容
      const q = questions[currentQIndex];
      document.getElementById('host-q-number').innerText = `QUESTION 0${currentQIndex + 1} / 0${questions.length}`;
      document.getElementById('host-question-text').innerText = q.q;
      document.getElementById('opt-a').innerText = q.a;
      document.getElementById('opt-b').innerText = q.b;
      document.getElementById('opt-c').innerText = q.c;
      document.getElementById('opt-d').innerText = q.d;
      
      // 重置選項背景顏色與特效
      ['a','b','c','d'].forEach(l => {
        document.getElementById(`box-opt-${l}`).style.opacity = "1";
        document.getElementById(`box-opt-${l}`).style.transform = "scale(1)";
      });

      // 廣播給雲端，讓玩家端同步跳出作答畫面
      socket.emit('nextQuestion', { pin: ROOM_PIN, questionIndex: currentQIndex });
      
      // 啟動 20 秒倒數
      startTimer();
    }

    function startTimer() {
      timeLeft = 20;
      document.getElementById('host-timer').innerText = timeLeft;
      
      if (countdownInterval) clearInterval(countdownInterval);
      
      countdownInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('host-timer').innerText = timeLeft;
        
        if (timeLeft <= 0) {
          clearInterval(countdownInterval);
          endQuestionRound();
        }
      }, 1000);
    }

    // 監聽玩家上傳答案
    socket.on('answerReceived', (data) => {
      // 記錄該玩家作答答案與剩餘時間（時間越多，分數越高）
      if (!currentRoundAnswers[data.playerId]) {
        currentRoundAnswers[data.playerId] = {
          answer: data.answer,
          timeBonus: timeLeft // 剩餘秒數當作計分加權
        };
        
        // 更新大螢幕上的作答人數
        const answeredCount = Object.keys(currentRoundAnswers).length;
        document.getElementById('host-answered-count').innerText = answeredCount;
        
        // BUG 防護：若所有人都在時間內提早答完了，直接強制結束倒數
        const totalPlayers = Object.keys(playersData).length;
        if (answeredCount >= totalPlayers && totalPlayers > 0) {
          clearInterval(countdownInterval);
          endQuestionRound();
        }
      }
    });

    // 回合結束：公佈答案、計算全場分數、切換到排行畫面
    function endQuestionRound() {
      const q = questions[currentQIndex];
      const correctAnswer = q.correct;
      
      // 💡 大螢幕視覺美編：正確答案維持高亮，錯誤答案變透明半隱藏
      ['A','B','C','D'].forEach(letter => {
        if(letter !== correctAnswer) {
          document.getElementById(`box-opt-${letter.toLowerCase()}`).style.opacity = "0.2";
        } else {
          document.getElementById(`box-opt-${letter.toLowerCase()}`).style.transform = "scale(1.03)";
        }
      });

      // 計算每個人的得分
      Object.keys(playersData).forEach(pId => {
        let pointsEarned = 0;
        let isCorrect = false;
        
        if (currentRoundAnswers[pId] && currentRoundAnswers[pId].answer === correctAnswer) {
          // 基礎分 500 + 時間加成分 (最高 500) = 最高 1000 分
          pointsEarned = 500 + (currentRoundAnswers[pId].timeBonus * 25);
          playersData[pId].score += pointsEarned;
          isCorrect = true;
        }
        
        // 將個別答題結果私密傳送給該玩家的手機端
        socket.to(pId).emit('roundResult', {
          isCorrect: isCorrect,
          pointsEarned: pointsEarned,
          currentTotal: playersData[pId].score,
          correctAnswer: correctAnswer
        });
      });

      // 延遲 3.5 秒後切換到積分排行榜畫面，讓大家有時間看正確答案
      setTimeout(() => {
        document.getElementById('host-game').classList.add('hidden');
        document.getElementById('host-scoreboard').classList.remove('hidden');
        renderLeaderboard();
      }, 3500);
    }

    function renderLeaderboard() {
      // 將資料轉換為陣列並進行大到小排序
      const sorted = Object.values(playersData).sort((a, b) => b.score - a.score);
      const container = document.getElementById('leaderboard-list');
      
      container.innerHTML = sorted.map((p, idx) => {
        let medal = idx === 0 ? "🥇" : idx === 1 ? "🥈" : idx === 2 ? "🥉" : "👤";
        return `
          <div class="flex justify-between items-center py-4 px-6 hover:bg-gray-50 transition">
            <div class="flex items-center gap-4">
              <span class="text-xl">${medal}</span>
              <span class="font-bold text-gray-700">${p.nickname}</span>
            </div>
            <span class="font-mono font-bold text-[#4A90E2] text-lg">${p.score} pts</span>
          </div>
        `;
      }).join('');
    }

    // 主持人點擊下一題
    document.getElementById('btn-next-question').addEventListener('click', () => {
      currentQIndex++;
      if (currentQIndex < questions.length) {
        document.getElementById('host-scoreboard').classList.add('hidden');
        document.getElementById('host-game').classList.remove('hidden');
        sendQuestion();
      } else {
        alert('🎉 恭喜完成全部「背經總複習」挑戰！');
        location.reload(); // 結束後重置刷新
      }
    });


    // --- 玩家端邏輯 ---
    let hasAnswered = false;
    let playerTimerInterval = null;

    document.getElementById('btn-join-room').addEventListener('click', () => {
      const nickname = document.getElementById('input-name').value.trim();
      const pin = document.getElementById('input-pin').value.trim();
      if(!nickname) return alert('請填寫暱稱以便計分！');
      
      socket.emit('joinRoom', { pin: pin, nickname: nickname });
      document.getElementById('player-footer-name').innerText = `參賽玩家：${nickname}`;
    });

    socket.on('joinSuccess', () => {
      document.getElementById('player-login').classList.add('hidden');
      document.getElementById('player-wait').classList.remove('hidden');
    });

    socket.on('joinError', (msg) => { alert(msg); });

    // 收到題目，開啟作答四色大按鈕
    socket.on('showOptions', (data) => {
      hasAnswered = false; // 💡 Bug修復：重置作答鎖定狀態
      document.getElementById('player-wait').classList.add('hidden');
      document.getElementById('player-result').classList.add('hidden');
      document.getElementById('player-game').classList.remove('hidden');
      document.getElementById('player-status').innerText = "請看大螢幕，選擇答案！";
      
      // 復原所有按鈕的可點擊狀態與視覺
      document.querySelectorAll('.btn-opt').forEach(btn => {
        btn.disabled = false;
        btn.style.opacity = "1";
        btn.style.cursor = "pointer";
      });

      // 手機同步倒數特效
      let pTime = 20;
      document.getElementById('player-timer').innerText = `${pTime}s`;
      if(playerTimerInterval) clearInterval(playerTimerInterval);
      playerTimerInterval = setInterval(() => {
        pTime--;
        document.getElementById('player-timer').innerText = `${pTime}s`;
        if(pTime <= 0) {
          clearInterval(playerTimerInterval);
          // 時間到，強制禁用所有按鈕
          lockPlayerButtons();
        }
      }, 1000);
    });

    function submitAnswer(letter) {
      if (hasAnswered) return; // 💡 Bug修復：防止重覆點擊洗版
      
      hasAnswered = true;
      clearInterval(playerTimerInterval);
      
      socket.emit('submitAnswer', { pin: ROOM_PIN, answer: letter });
      document.getElementById('player-status').innerText = `已鎖定答案 [ ${letter} ]，靜待結果...`;
      
      // 視覺反饋：將未選擇的按鈕變暗
      lockPlayerButtons();
    }

    function lockPlayerButtons() {
      document.querySelectorAll('.btn-opt').forEach(btn => {
        btn.disabled = true;
        btn.style.opacity = "0.3";
        btn.style.cursor = "not-allowed";
      });
    }

    // 接收單題結算結果
    socket.on('roundResult', (data) => {
      if(playerTimerInterval) clearInterval(playerTimerInterval);
      
      document.getElementById('player-game').classList.add('hidden');
      document.getElementById('player-result').classList.remove('hidden');
      
      const resTitle = document.getElementById('player-result-title');
      const resScore = document.getElementById('player-result-score');
      
      if (data.isCorrect) {
        document.getElementById('player-result').className = "text-center py-12 space-y-4 rounded-3xl bg-emerald-950/40 border border-emerald-500/30 text-emerald-400 animate-fadeIn";
        resTitle.innerText = "🎉 答對了！";
        resScore.innerText = `此題得分：+${Math.round(data.pointsEarned)} pts\n總積分：${Math.round(data.currentTotal)} pts`;
      } else {
        document.getElementById('player-result').className = "text-center py-12 space-y-4 rounded-3xl bg-rose-950/40 border border-rose-500/30 text-rose-400 animate-fadeIn";
        resTitle.innerText = "❌ 答錯了或超時";
        resScore.innerText = `正確答案是：${data.correctAnswer}\n總積分：${Math.round(data.currentTotal)} pts`;
      }
    });
  </script>
</body>
</html>
